<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desmos Calculator | oleksyuk</title>
    <link rel="icon" type="image/png" href="https://0bsidian.s3.us-east-2.amazonaws.com/Images/Geometric_Gray_Gemstone-removebg-preview.png">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles.css">
    <style>
        .page-wrapper {
            padding: var(--space-md);
        }
        
        .calculator-container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .card-glass {
            padding: var(--space-lg);
            height: calc(100vh - var(--space-2xl));
            display: flex;
            flex-direction: column;
        }
        
        .page-header {
            margin-bottom: var(--space-md);
        }
        
        .page-title {
            font-size: 1.75rem;
        }
        
        .calculator-frame {
            flex: 1;
            border-radius: var(--radius-md);
            overflow: hidden;
            background: #fff;
            min-height: 400px;
        }
        
        .calculator-frame iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        
        .action-bar {
            display: flex;
            justify-content: center;
            gap: var(--space-md);
            margin-top: var(--space-md);
            flex-wrap: wrap;
        }
    </style>
</head>
<body>
    <div class="page-wrapper">
        <div class="calculator-container">
            <div class="card-glass">
                <header class="page-header animate-fade-in-up text-center">
                    <h1 class="page-title">
                        oleksyuk Desmos
                    </h1>
                    <p class="page-subtitle">Graphing Calculator powered by Desmos</p>
                </header>
                
                <div class="calculator-frame animate-fade-in-up stagger-1">
                    <iframe src="./desmos-embed.html" title="Desmos Graphing Calculator" allowfullscreen></iframe>
                </div>
                
                <div class="action-bar animate-fade-in-up stagger-2">
                    <button class="btn btn-primary" onclick="openInAboutBlank()">
                        🚀 Open in about:blank
                    </button>
                    <a href="./index.html" class="btn btn-ghost">
                        ← Back to Math
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script>
        let sharedWindow = null;
        let lastClickTime = 0;
        const debounceDelay = 1000;

        function openInAboutBlank() {
            const currentTime = Date.now();
            if (currentTime - lastClickTime < debounceDelay) return;
            lastClickTime = currentTime;

            try {
                if (!sharedWindow || sharedWindow.closed) {
                    sharedWindow = window.open('about:blank', 'desmosWindow');
                    if (!sharedWindow) {
                        alert('Popup blocked. Please allow popups for this site.');
                        return;
                    }
                    sharedWindow.document.write(`
                        <!DOCTYPE html>
                        <html>
                        <head>
                            <title>Google Classroom</title>
                            <link rel="icon" href="https://ssl.gstatic.com/classroom/favicon.png">
                            <style>
                                body, html {
                                    margin: 0;
                                    height: 100%;
                                    overflow: hidden;
                                }
                                iframe {
                                    width: 100%;
                                    height: 100%;
                                    border: none;
                                }
                            </style>
                        </head>
                        <body>
                            <iframe src="${window.location.origin}/math/desmos-embed.html" allowfullscreen></iframe>
                        </body>
                        </html>
                    `);
                    sharedWindow.document.close();
                }
                sharedWindow.focus();
            } catch (e) {
                alert('An error occurred: ' + e.message);
            }
        }

        window.onbeforeunload = function() {
            if (sharedWindow && !sharedWindow.closed) {
                sharedWindow.close();
            }
        };
    </script>
</body>
</html>
