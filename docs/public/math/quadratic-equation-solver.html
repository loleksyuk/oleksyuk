<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quadratic Solver | oleksyuk</title>
    <link rel="icon" type="image/png" href="https://0bsidian.s3.us-east-2.amazonaws.com/Images/Geometric_Gray_Gemstone-removebg-preview.png">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles.css">
    <style>
        .solver-container {
            max-width: 600px;
            margin: 0 auto;
        }
        
        .equation-display {
            text-align: center;
            padding: var(--space-lg);
            background: rgba(0, 0, 0, 0.3);
            border-radius: var(--radius-md);
            margin-bottom: var(--space-xl);
            font-family: 'Space Mono', monospace;
            font-size: 1.5rem;
            color: var(--accent-secondary);
        }
        
        .coefficient-inputs {
            display: flex;
            justify-content: center;
            gap: var(--space-lg);
            margin-bottom: var(--space-xl);
            flex-wrap: wrap;
        }
        
        .coefficient-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: var(--space-sm);
        }
        
        .coefficient-label {
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
            color: var(--accent-primary);
        }
        
        .coefficient-input {
            width: 100px;
            text-align: center;
            font-family: 'Space Mono', monospace;
            font-size: 1.25rem;
        }
        
        .action-buttons {
            display: flex;
            justify-content: center;
            gap: var(--space-md);
            flex-wrap: wrap;
            margin-bottom: var(--space-xl);
        }
        
        .result-box {
            padding: var(--space-xl);
            background: var(--oleksyuk-card);
            border: 1px solid var(--oleksyuk-border);
            border-radius: var(--radius-md);
            text-align: center;
        }
        
        .result-title {
            font-size: 0.875rem;
            color: var(--text-secondary);
            margin-bottom: var(--space-sm);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
        
        .result-value {
            font-family: 'Space Mono', monospace;
            font-size: 1.5rem;
            color: var(--success);
            word-break: break-word;
        }
        
        .result-value.error {
            color: var(--danger);
        }
        
        .result-value.info {
            color: var(--warning);
        }
        
        .discriminant-info {
            margin-top: var(--space-lg);
            padding: var(--space-md);
            background: rgba(0, 0, 0, 0.2);
            border-radius: var(--radius-sm);
            font-size: 0.875rem;
            color: var(--text-secondary);
        }
        
        .format-toggle {
            font-size: 0.875rem;
        }
    </style>
</head>
<body>
    <div class="page-wrapper">
        <div class="container">
            <div class="card-glass">
                <header class="page-header animate-fade-in-up">
                    <h1 class="page-title">
                        oleksyuk Quadratic Solver
                    </h1>
                    <p class="page-subtitle">Solve quadratic equations with ease</p>
                </header>
                
                <div class="solver-container">
                    <div class="equation-display animate-fade-in-up stagger-1">
                        ax² + bx + c = 0
                    </div>
                    
                    <div class="coefficient-inputs animate-fade-in-up stagger-2">
                        <div class="coefficient-group">
                            <label class="coefficient-label">a</label>
                            <input type="number" id="a" class="coefficient-input" placeholder="0" step="any">
                        </div>
                        <div class="coefficient-group">
                            <label class="coefficient-label">b</label>
                            <input type="number" id="b" class="coefficient-input" placeholder="0" step="any">
                        </div>
                        <div class="coefficient-group">
                            <label class="coefficient-label">c</label>
                            <input type="number" id="c" class="coefficient-input" placeholder="0" step="any">
                        </div>
                    </div>
                    
                    <div class="action-buttons animate-fade-in-up stagger-3">
                        <button class="btn btn-primary btn-lg" onclick="solveQuadratic()">Solve</button>
                        <button class="btn format-toggle" onclick="toggleFormat()">
                            Switch to Fraction
                        </button>
                        <button class="btn btn-ghost" onclick="clearInputs()">Clear</button>
                    </div>
                    
                    <div class="result-box animate-fade-in-up stagger-4" id="resultBox" style="display: none;">
                        <div class="result-title">Solution</div>
                        <div class="result-value" id="result"></div>
                        <div class="discriminant-info" id="discriminantInfo"></div>
                    </div>
                </div>
                
                <div class="menu-list" style="max-width: 300px;">
                    <a href="./index.html" class="menu-link back-link animate-fade-in-up stagger-5">
                        ← Back to Math
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script>
        let isFractionFormat = false;
        let lastResult = null;

        function gcd(a, b) {
            a = Math.abs(a);
            b = Math.abs(b);
            while (b) {
                let temp = b;
                b = a % b;
                a = temp;
            }
            return a;
        }

        function toFraction(decimal) {
            const tolerance = 1.0E-10;
            const maxDenominator = 10000;
            let numerator = 0;
            let denominator = 1;
            let bestNumerator = 0;
            let bestDenominator = 1;
            let bestError = Math.abs(decimal);

            const integerPart = Math.floor(decimal);
            const fractionalPart = decimal - integerPart;

            if (fractionalPart < tolerance) {
                return `${integerPart}`;
            }

            let a = fractionalPart;
            let h1 = 1, h2 = 0, k1 = 0, k2 = 1;

            while (denominator <= maxDenominator) {
                const n = Math.floor(a);
                numerator = h1 * n + h2;
                denominator = k1 * n + k2;

                if (denominator > maxDenominator) break;

                const error = Math.abs(decimal - (integerPart + numerator / denominator));
                if (error < bestError) {
                    bestNumerator = numerator + integerPart * denominator;
                    bestDenominator = denominator;
                    bestError = error;
                }

                if (error < tolerance) break;

                h2 = h1; h1 = numerator;
                k2 = k1; k1 = denominator;
                a = 1 / (a - n);
            }

            const g = gcd(bestNumerator, bestDenominator);
            bestNumerator = Math.round(bestNumerator / g);
            bestDenominator = Math.round(bestDenominator / g);

            if (decimal < 0 && bestNumerator > 0) {
                bestNumerator = -bestNumerator;
            }

            if (bestDenominator === 1) {
                return `${bestNumerator}`;
            }
            return `${bestNumerator}/${bestDenominator}`;
        }

        function formatResult(a, b, c, discriminant) {
            if (discriminant > 0) {
                const root1 = (-b + Math.sqrt(discriminant)) / (2 * a);
                const root2 = (-b - Math.sqrt(discriminant)) / (2 * a);
                if (isFractionFormat) {
                    return `x₁ = ${toFraction(root1)}<br>x₂ = ${toFraction(root2)}`;
                }
                return `x₁ = ${root1.toFixed(6)}<br>x₂ = ${root2.toFixed(6)}`;
            } else if (discriminant === 0) {
                const root = -b / (2 * a);
                if (isFractionFormat) {
                    return `x = ${toFraction(root)}`;
                }
                return `x = ${root.toFixed(6)}`;
            } else {
                const realPart = (-b / (2 * a)).toFixed(4);
                const imagPart = (Math.sqrt(-discriminant) / (2 * a)).toFixed(4);
                return `x₁ = ${realPart} + ${imagPart}i<br>x₂ = ${realPart} - ${imagPart}i`;
            }
        }

        function getDiscriminantInfo(discriminant) {
            if (discriminant > 0) {
                return `Discriminant: ${discriminant.toFixed(4)} (positive) → Two distinct real roots`;
            } else if (discriminant === 0) {
                return `Discriminant: 0 → One repeated real root`;
            } else {
                return `Discriminant: ${discriminant.toFixed(4)} (negative) → Two complex conjugate roots`;
            }
        }

        function solveQuadratic() {
            const a = parseFloat(document.getElementById('a').value);
            const b = parseFloat(document.getElementById('b').value);
            const c = parseFloat(document.getElementById('c').value);
            const resultEl = document.getElementById('result');
            const resultBox = document.getElementById('resultBox');
            const discInfo = document.getElementById('discriminantInfo');

            resultBox.style.display = 'block';

            if (isNaN(a) || isNaN(b) || isNaN(c)) {
                resultEl.innerHTML = "Please enter valid numbers for a, b, and c.";
                resultEl.className = 'result-value error';
                discInfo.textContent = '';
                return;
            }

            if (a === 0) {
                resultEl.innerHTML = "Coefficient 'a' cannot be zero (not a quadratic equation).";
                resultEl.className = 'result-value error';
                discInfo.textContent = '';
                return;
            }

            const discriminant = b * b - 4 * a * c;
            lastResult = { a, b, c, discriminant };
            
            resultEl.innerHTML = formatResult(a, b, c, discriminant);
            resultEl.className = discriminant >= 0 ? 'result-value' : 'result-value info';
            discInfo.textContent = getDiscriminantInfo(discriminant);
        }

        function toggleFormat() {
            isFractionFormat = !isFractionFormat;
            document.querySelector('.format-toggle').textContent = 
                isFractionFormat ? 'Switch to Decimal' : 'Switch to Fraction';
            if (lastResult) {
                const { a, b, c, discriminant } = lastResult;
                document.getElementById('result').innerHTML = formatResult(a, b, c, discriminant);
            }
        }

        function clearInputs() {
            document.getElementById('a').value = '';
            document.getElementById('b').value = '';
            document.getElementById('c').value = '';
            document.getElementById('resultBox').style.display = 'none';
            lastResult = null;
        }

        // Allow Enter key to solve
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') solveQuadratic();
        });
    </script>
</body>
</html>
