<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Race Counter</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
        }
        .container {
            background: white;
            padding: 1.5rem;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            width: 90%;
            max-width: 500px;
            box-sizing: border-box;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 1.2rem;
            font-size: 1.8rem;
        }
        .counter {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.8rem;
            padding: 0.5rem;
            border-radius: 5px;
            transition: background-color 0.3s;
        }
        .counter:hover {
            background-color: #f8f9fa;
        }
        .counter span {
            font-size: 1rem;
            color: #333;
            flex: 1;
            text-align: center;
        }
        .counter button {
            padding: 0.5rem 0.8rem;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
            transition: transform 0.2s, background-color 0.2s;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .counter button:hover {
            transform: scale(1.05);
        }
        .increment {
            background-color: #28a745;
            color: white;
        }
        .decrement {
            background-color: #dc3545;
            color: white;
        }
        .reset, .show-chart {
            display: block;
            margin: 1.2rem auto 0;
            padding: 0.6rem 1.2rem;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
            transition: background-color 0.2s;
            width: 100%;
            max-width: 200px;
        }
        .reset {
            background-color: #007bff;
            color: white;
        }
        .reset:hover {
            background-color: #0056b3;
        }
        .show-chart {
            background-color: #ffc107;
            color: #333;
        }
        .show-chart:hover {
            background-color: #e0a800;
        }
        .chart-container {
            display: none;
            margin-top: 1.5rem;
            text-align: center;
        }
        .piechart {
            width: 60vw;
            max-width: 200px;
            height: 60vw;
            max-height: 200px;
            border-radius: 50%;
            margin: 0 auto;
        }
        .legend {
            margin-top: 1rem;
            font-size: 0.9rem;
        }
        .legend div {
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0.4rem 0;
        }
        .legend span {
            display: inline-block;
            width: 12px;
            height: 12px;
            margin-right: 0.4rem;
        }

        /* Media queries for smaller screens */
        @media (max-width: 600px) {
            .container {
                padding: 1rem;
            }
            h1 {
                font-size: 1.5rem;
            }
            .counter {
                padding: 0.4rem;
            }
            .counter span {
                font-size: 0.9rem;
            }
            .counter button {
                padding: 0.4rem;
                width: 35px;
                height: 35px;
                font-size: 0.9rem;
            }
            .reset, .show-chart {
                padding: 0.5rem 1rem;
                font-size: 0.9rem;
                max-width: 180px;
            }
            .piechart {
                width: 50vw;
                max-width: 180px;
                height: 50vw;
                max-height: 180px;
            }
            .legend {
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Race Counter</h1>
        <div id="counters"></div>
        <button class="show-chart" onclick="toggleChart()">Show Pie Chart</button>
        <button class="reset" onclick="resetAll()">Reset All</button>
        <div class="chart-container" id="chartContainer">
            <div class="piechart" id="pieChart"></div>
            <div class="legend" id="legend"></div>
        </div>
    </div>

    <script>
        // Fixed list of races with associated colors
        const races = [
            { name: 'Asian', color: '#ff6b6b' },
            { name: 'Black', color: '#4ecdc4' },
            { name: 'Hispanic', color: '#45b7d1' },
            { name: 'White', color: '#96ceb4' },
            { name: 'Other', color: '#ffeead' }
        ];

        // Initialize counts to 0 for all races
        let counts = races.reduce((acc, race) => ({ ...acc, [race.name]: 0 }), {});

        // Save counts to local storage
        function saveCounts() {
            localStorage.setItem('raceCounts', JSON.stringify(counts));
        }

        // Render counters
        function renderCounters() {
            const countersDiv = document.getElementById('counters');
            countersDiv.innerHTML = '';
            races.forEach(race => {
                const counterDiv = document.createElement('div');
                counterDiv.className = 'counter';
                // Only include decrement button if count is greater than 0
                const decrementButton = counts[race.name] > 0 
                    ? `<button class="decrement" onclick="updateCount('${race.name}', -1)">-</button>` 
                    : `<div style="width: 40px;"></div>`; // Placeholder for alignment
                counterDiv.innerHTML = `
                    ${decrementButton}
                    <span>${race.name}: ${counts[race.name]}</span>
                    <button class="increment" onclick="updateCount('${race.name}', 1)">+</button>
                `;
                countersDiv.appendChild(counterDiv);
            });
            saveCounts();
        }

        // Update count for a race
        function updateCount(race, change) {
            counts[race] = (counts[race] || 0) + change;
            if (counts[race] < 0) counts[race] = 0; // Prevent negative counts
            renderCounters();
            updateChart();
        }

        // Reset all counts
        function resetAll() {
            counts = races.reduce((acc, race) => ({ ...acc, [race.name]: 0 }), {});
            renderCounters();
            updateChart();
        }

        // Toggle pie chart visibility
        function toggleChart() {
            const chartContainer = document.getElementById('chartContainer');
            const isVisible = chartContainer.style.display === 'block';
            chartContainer.style.display = isVisible ? 'none' : 'block';
            if (!isVisible) updateChart();
        }

        // Update pie chart
        function updateChart() {
            const pieChart = document.getElementById('pieChart');
            const legend = document.getElementById('legend');
            const total = Object.values(counts).reduce((sum, count) => sum + count, 0);
            let conicGradient = '';
            let currentAngle = 0;
            legend.innerHTML = '';

            races.forEach(race => {
                const count = counts[race.name];
                if (total > 0) {
                    const percentage = (count / total) * 360;
                    conicGradient += `${race.color} ${currentAngle}deg ${currentAngle + percentage}deg, `;
                    currentAngle += percentage;
                }
                // Add legend item
                const legendItem = document.createElement('div');
                legendItem.innerHTML = `<span style="background-color: ${race.color};"></span>${race.name}: ${count}`;
                legend.appendChild(legendItem);
            });

            // Remove trailing comma and set default if total is 0
            conicGradient = total > 0 ? conicGradient.slice(0, -2) : '#e0e0e0 0deg 360deg';
            pieChart.style.backgroundImage = `conic-gradient(${conicGradient})`;
        }

        // Initial render
        renderCounters();
        updateChart();
    </script>
</body>
</html>
