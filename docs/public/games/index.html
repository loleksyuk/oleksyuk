<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Games | oleksyuk</title>
    <link rel="icon" type="image/png" href="https://0bsidian.s3.us-east-2.amazonaws.com/Images/Geometric_Gray_Gemstone-removebg-preview.png">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles.css">
    <style>
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: var(--space-lg);
            margin-top: var(--space-xl);
        }
        
        .game-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: var(--space-xl);
            background: var(--oleksyuk-card);
            border: 1px solid var(--oleksyuk-border);
            border-radius: var(--radius-lg);
            text-decoration: none;
            color: var(--text-primary);
            transition: all var(--transition-normal);
            position: relative;
            overflow: hidden;
        }
        
        .game-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(124, 92, 255, 0.1), transparent);
            opacity: 0;
            transition: opacity var(--transition-normal);
        }
        
        .game-card:hover {
            background: var(--oleksyuk-hover);
            transform: translateY(-8px) scale(1.02);
            box-shadow: var(--shadow-lg), var(--shadow-glow);
            border-color: var(--accent-primary);
        }
        
        .game-card:hover::before {
            opacity: 1;
        }
        
        .game-icon {
            font-size: 3.5rem;
            margin-bottom: var(--space-md);
            transition: transform var(--transition-normal);
            position: relative;
        }
        
        .game-card:hover .game-icon {
            transform: scale(1.2) rotate(-5deg);
        }
        
        .game-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            text-align: center;
            position: relative;
        }
        
        .category-divider {
            margin: var(--space-2xl) 0 var(--space-lg);
            padding-bottom: var(--space-sm);
            border-bottom: 1px solid var(--oleksyuk-border);
            font-family: 'Orbitron', sans-serif;
            font-size: 0.875rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            display: flex;
            align-items: center;
            gap: var(--space-sm);
        }
        
        .new-badge {
            position: absolute;
            top: var(--space-sm);
            right: var(--space-sm);
            padding: 2px 8px;
            background: var(--accent-gradient);
            border-radius: 10px;
            font-size: 0.625rem;
            font-family: 'Orbitron', sans-serif;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="page-wrapper">
        <div class="container">
            <div class="card-glass">
                <header class="page-header animate-fade-in-up">
                    <h1 class="page-title">
                        oleksyuk Games
                    </h1>
                    <p class="page-subtitle">Play browser games for free</p>
                </header>
                
                <div class="category-divider animate-fade-in-up stagger-1">🎮 Classic Games</div>
                <div class="games-grid">
                    <a href="./tetris.html" class="game-card animate-fade-in-up stagger-2">
                        <span class="game-icon">🧱</span>
                        <span class="game-name">Tetris</span>
                    </a>
                    
                    <a href="./Snakegame.html" class="game-card animate-fade-in-up stagger-2">
                        <span class="game-icon">🐍</span>
                        <span class="game-name">Snake</span>
                    </a>
                    
                    <a href="./tic-tac-toe.html" class="game-card animate-fade-in-up stagger-2">
                        <span class="game-icon">⭕</span>
                        <span class="game-name">Tic Tac Toe</span>
                    </a>
                    
                    <a href="./brick-breaker.html" class="game-card animate-fade-in-up stagger-3">
                        <span class="game-icon">🧱</span>
                        <span class="game-name">Brick Breaker</span>
                    </a>
                </div>
                
                <div class="category-divider animate-fade-in-up stagger-4">🚗 Action & Arcade</div>
                <div class="games-grid">
                    <a href="./slopeoffline.html" class="game-card animate-fade-in-up stagger-5">
                        <span class="game-icon">⛷️</span>
                        <span class="game-name">Slope</span>
                    </a>
                    
                    <a href="./mini-car-game.html" class="game-card animate-fade-in-up stagger-5">
                        <span class="game-icon">🚗</span>
                        <span class="game-name">Mini Car</span>
                    </a>
                    
                    <a href="./maze.html" class="game-card animate-fade-in-up stagger-5">
                        <span class="game-icon">🌀</span>
                        <span class="game-name">Maze</span>
                    </a>
                </div>
                
                <div class="menu-list" style="max-width: 300px;">
                    <a href="../index.html" class="menu-link back-link animate-fade-in-up stagger-6">
                        ← Back to Home
                    </a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
