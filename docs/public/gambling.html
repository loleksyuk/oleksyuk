<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gambling | oleksyuk</title>
    <link rel="icon" type="image/png" href="https://0bsidian.s3.us-east-2.amazonaws.com/Images/Geometric_Gray_Gemstone-removebg-preview.png">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .gambling-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: var(--space-lg);
            margin-top: var(--space-xl);
        }
        
        .gambling-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: var(--space-xl);
            background: var(--oleksyuk-card);
            border: 1px solid var(--oleksyuk-border);
            border-radius: var(--radius-lg);
            text-decoration: none;
            color: var(--text-primary);
            transition: all var(--transition-normal);
            position: relative;
            overflow: hidden;
        }
        
        .gambling-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(142, 161, 216, 0.12), transparent);
            transition: left 0.6s ease;
        }
        
        .gambling-card:hover::before {
            left: 100%;
        }
        
        .gambling-card:hover {
            background: var(--oleksyuk-hover);
            transform: translateY(-8px);
            box-shadow: var(--shadow-lg), 0 0 40px rgba(126, 144, 208, 0.16);
            border-color: var(--accent-primary);
        }
        
        .gambling-icon {
            font-size: 4rem;
            margin-bottom: var(--space-md);
            transition: transform var(--transition-normal);
        }
        
        .gambling-card:hover .gambling-icon {
            transform: scale(1.2) rotate(10deg);
            animation: shake 0.5s ease;
        }
        
        @keyframes shake {
            0%, 100% { transform: scale(1.2) rotate(10deg); }
            25% { transform: scale(1.2) rotate(-5deg); }
            75% { transform: scale(1.2) rotate(15deg); }
        }
        
        .gambling-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: var(--space-sm);
        }
        
        .gambling-desc {
            font-size: 0.875rem;
            color: var(--text-secondary);
            text-align: center;
        }
        
        .warning-banner {
            background: rgba(251, 191, 36, 0.1);
            border: 1px solid rgba(251, 191, 36, 0.3);
            border-radius: var(--radius-md);
            padding: var(--space-md);
            margin-bottom: var(--space-xl);
            text-align: center;
            color: var(--warning);
            font-size: 0.875rem;
        }
        
        .warning-banner span {
            margin-right: var(--space-sm);
        }
    </style>
</head>
<body>
    <div class="page-wrapper">
        <div class="container">
            <div class="card-glass">
                <header class="page-header animate-fade-in-up">
                    <h1 class="page-title">
                        oleksyuk Gambling
                    </h1>
                    <p class="page-subtitle">Test your luck with virtual currency</p>
                </header>
                
                <div class="warning-banner animate-fade-in-up stagger-1">
                    <span>⚠️</span>
                    For entertainment purposes only. No real money involved.
                </div>
                
                <div class="gambling-grid">
                    <a href="./gambling/jackblack.html" class="gambling-card animate-fade-in-up stagger-2">
                        <span class="gambling-icon">🃏</span>
                        <span class="gambling-name">Blackjack</span>
                        <span class="gambling-desc">Beat the dealer to 21</span>
                    </a>
                    
                    <a href="./gambling/slots.html" class="gambling-card animate-fade-in-up stagger-3">
                        <span class="gambling-icon">🎰</span>
                        <span class="gambling-name">Slots</span>
                        <span class="gambling-desc">Spin to win big</span>
                    </a>
                </div>
                
                <div class="menu-list" style="max-width: 300px;">
                    <a href="./index.html" class="menu-link back-link animate-fade-in-up stagger-4">
                        ← Back to Home
                    </a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
