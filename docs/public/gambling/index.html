<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gambling | oleksyuk</title>
    <link rel="icon" type="image/png" href="https://0bsidian.s3.us-east-2.amazonaws.com/Images/Geometric_Gray_Gemstone-removebg-preview.png">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles.css">
    <style>
        .gambling-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: var(--space-lg);
            margin-top: var(--space-xl);
        }
        
        .gambling-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: var(--space-xl);
            background: var(--oleksyuk-card);
            border: 1px solid var(--oleksyuk-border);
            border-radius: var(--radius-lg);
            text-decoration: none;
            color: var(--text-primary);
            transition: all var(--transition-normal);
            position: relative;
            overflow: hidden;
        }
        
        .gambling-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(142, 161, 216, 0.12), transparent);
            transition: left 0.6s ease;
        }
        
        .gambling-card:hover::before {
            left: 100%;
        }
        
        .gambling-card:hover {
            background: var(--oleksyuk-hover);
            transform: translateY(-8px);
            box-shadow: var(--shadow-lg), 0 0 40px rgba(126, 144, 208, 0.16);
            border-color: var(--accent-primary);
        }
        
        .gambling-icon {
            font-size: 4rem;
            margin-bottom: var(--space-md);
            transition: transform var(--transition-normal);
        }
        
        .gambling-card:hover .gambling-icon {
            transform: scale(1.2) rotate(10deg);
            animation: shake 0.5s ease;
        }
        
        @keyframes shake {
            0%, 100% { transform: scale(1.2) rotate(10deg); }
            25% { transform: scale(1.2) rotate(-5deg); }
            75% { transform: scale(1.2) rotate(15deg); }
        }
        
        .gambling-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: var(--space-sm);
        }
        
        .gambling-desc {
            font-size: 0.875rem;
            color: var(--text-secondary);
            text-align: center;
        }
        
        .warning-banner {
            background: rgba(251, 191, 36, 0.1);
            border: 1px solid rgba(251, 191, 36, 0.3);
            border-radius: var(--radius-md);
            padding: var(--space-md);
            margin-bottom: var(--space-xl);
            text-align: center;
            color: var(--warning);
            font-size: 0.875rem;
        }
        
        .stats-banner {
            display: flex;
            justify-content: center;
            gap: var(--space-2xl);
            padding: var(--space-lg);
            background: rgba(0, 0, 0, 0.3);
            border-radius: var(--radius-md);
            margin-bottom: var(--space-xl);
            flex-wrap: wrap;
        }
        
        .stat {
            text-align: center;
        }
        
        .stat-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            color: var(--success);
        }
        
        .stat-label {
            font-size: 0.75rem;
            color: var(--text-muted);
        }
    </style>
</head>
<body>
    <div class="page-wrapper">
        <div class="container">
            <div class="card-glass">
                <header class="page-header animate-fade-in-up">
                    <h1 class="page-title">
                        oleksyuk Casino
                    </h1>
                    <p class="page-subtitle">Test your luck with virtual currency</p>
                </header>
                
                <div class="warning-banner animate-fade-in-up stagger-1">
                    ⚠️ For entertainment purposes only. No real money involved.
                </div>
                
                <div class="stats-banner animate-fade-in-up stagger-2">
                    <div class="stat">
                        <div class="stat-value" id="totalBalance">$0</div>
                        <div class="stat-label">Total Balance</div>
                    </div>
                    <div class="stat">
                        <div class="stat-value">4</div>
                        <div class="stat-label">Games Available</div>
                    </div>
                </div>
                
                <div class="gambling-grid">
                    <a href="./blackjack.html" class="gambling-card animate-fade-in-up stagger-3">
                        <span class="gambling-icon">🃏</span>
                        <span class="gambling-name">Blackjack</span>
                        <span class="gambling-desc">Beat the dealer to 21</span>
                    </a>
                    
                    <a href="./slots.html" class="gambling-card animate-fade-in-up stagger-3">
                        <span class="gambling-icon">🎰</span>
                        <span class="gambling-name">Slots</span>
                        <span class="gambling-desc">Spin to win big</span>
                    </a>
                    
                    <a href="./roulette.html" class="gambling-card animate-fade-in-up stagger-4">
                        <span class="gambling-icon">🎡</span>
                        <span class="gambling-name">Roulette</span>
                        <span class="gambling-desc">Pick your lucky number</span>
                    </a>
                    
                    <a href="./coinflip.html" class="gambling-card animate-fade-in-up stagger-4">
                        <span class="gambling-icon">🪙</span>
                        <span class="gambling-name">Coin Flip</span>
                        <span class="gambling-desc">50/50 chance to double</span>
                    </a>
                </div>
                
                <div class="menu-list" style="max-width: 300px;">
                    <a href="../index.html" class="menu-link back-link animate-fade-in-up stagger-5">
                        ← Back to Home
                    </a>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // Calculate total balance from all games
        const blackjackBal = parseFloat(localStorage.getItem('blackjackBalance')) || 0;
        const slotsBal = parseFloat(localStorage.getItem('slotsBalance')) || 0;
        const rouletteBal = parseFloat(localStorage.getItem('rouletteBalance')) || 0;
        const coinflipBal = parseFloat(localStorage.getItem('coinflipBalance')) || 0;
        
        const total = blackjackBal + slotsBal + rouletteBal + coinflipBal;
        
        function formatNumber(num) {
            if (Math.abs(num) >= 1e12) return (num / 1e12).toFixed(1) + 'T';
            if (Math.abs(num) >= 1e9) return (num / 1e9).toFixed(1) + 'B';
            if (Math.abs(num) >= 1e6) return (num / 1e6).toFixed(1) + 'M';
            if (Math.abs(num) >= 1e3) return (num / 1e3).toFixed(1) + 'K';
            return num.toLocaleString();
        }
        
        document.getElementById('totalBalance').textContent = '$' + formatNumber(total);
    </script>
</body>
</html>
