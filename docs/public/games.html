<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Games | oleksyuk</title>
    <link rel="icon" type="image/png" href="https://0bsidian.s3.us-east-2.amazonaws.com/Images/Geometric_Gray_Gemstone-removebg-preview.png">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: var(--space-md);
            margin-top: var(--space-xl);
        }
        
        .game-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: var(--space-lg);
            background: var(--oleksyuk-card);
            border: 1px solid var(--oleksyuk-border);
            border-radius: var(--radius-md);
            text-decoration: none;
            color: var(--text-primary);
            transition: all var(--transition-normal);
            cursor: pointer;
        }
        
        .game-card:hover {
            background: var(--oleksyuk-hover);
            transform: translateY(-6px) scale(1.02);
            box-shadow: var(--shadow-md), 0 0 20px rgba(124, 92, 255, 0.2);
            border-color: var(--accent-primary);
        }
        
        .game-icon {
            font-size: 3rem;
            margin-bottom: var(--space-sm);
            transition: transform var(--transition-normal);
        }
        
        .game-card:hover .game-icon {
            transform: scale(1.2) rotate(-5deg);
        }
        
        .game-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            text-align: center;
        }
        
        .category-section {
            margin-bottom: var(--space-2xl);
        }
        
        .category-title {
            display: flex;
            align-items: center;
            gap: var(--space-md);
            font-size: 1.25rem;
            color: var(--text-secondary);
            margin-bottom: var(--space-md);
            padding-bottom: var(--space-sm);
            border-bottom: 1px solid var(--oleksyuk-border);
        }
        
        .category-title span {
            font-size: 1.5rem;
        }
    </style>
</head>
<body>
    <div class="page-wrapper">
        <div class="container">
            <div class="card-glass">
                <header class="page-header animate-fade-in-up">
                    <h1 class="page-title">
                        oleksyuk Games
                    </h1>
                    <p class="page-subtitle">Fun browser games to pass the time</p>
                </header>
                
                <section class="category-section">
                    <h2 class="category-title animate-fade-in-up stagger-1">
                        <span>🎯</span> Classic Games
                    </h2>
                    <div class="games-grid">
                        <a href="./games/tetris.html" class="game-card animate-fade-in-up stagger-2">
                            <span class="game-icon">🧱</span>
                            <span class="game-name">Tetris</span>
                        </a>
                        <a href="./games/Snakegame.html" class="game-card animate-fade-in-up stagger-2">
                            <span class="game-icon">🐍</span>
                            <span class="game-name">Snake</span>
                        </a>
                        <a href="./games/tic-tac-toe.html" class="game-card animate-fade-in-up stagger-3">
                            <span class="game-icon">⭕</span>
                            <span class="game-name">Tic Tac Toe</span>
                        </a>
                        <a href="./games/brick-breaker.html" class="game-card animate-fade-in-up stagger-3">
                            <span class="game-icon">🧨</span>
                            <span class="game-name">Brick Breaker</span>
                        </a>
                    </div>
                </section>
                
                <section class="category-section">
                    <h2 class="category-title animate-fade-in-up stagger-4">
                        <span>🚗</span> Action & Arcade
                    </h2>
                    <div class="games-grid">
                        <a href="./games/slopeoffline.html" class="game-card animate-fade-in-up stagger-5">
                            <span class="game-icon">⚪</span>
                            <span class="game-name">Slope</span>
                        </a>
                        <a href="./games/mini-car-game.html" class="game-card animate-fade-in-up stagger-5">
                            <span class="game-icon">🏎️</span>
                            <span class="game-name">Mini Car</span>
                        </a>
                        <a href="./games/maze.html" class="game-card animate-fade-in-up stagger-6">
                            <span class="game-icon">🌀</span>
                            <span class="game-name">Maze</span>
                        </a>
                    </div>
                </section>
                
                <div class="menu-list" style="max-width: 300px;">
                    <a href="./index.html" class="menu-link back-link animate-fade-in-up stagger-7">
                        ← Back to Home
                    </a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
