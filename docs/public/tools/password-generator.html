<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator | oleksyuk</title>
    <link rel="icon" type="image/png" href="https://0bsidian.s3.us-east-2.amazonaws.com/Images/Geometric_Gray_Gemstone-removebg-preview.png">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles.css">
    <style>
        .generator-container {
            max-width: 550px;
            margin: 0 auto;
        }
        
        .password-display {
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid var(--oleksyuk-border);
            border-radius: var(--radius-md);
            padding: var(--space-lg);
            margin-bottom: var(--space-xl);
            position: relative;
        }
        
        .password-text {
            font-family: 'Space Mono', monospace;
            font-size: 1.5rem;
            color: var(--success);
            word-break: break-all;
            text-align: center;
            min-height: 2rem;
            line-height: 1.4;
        }
        
        .password-actions {
            display: flex;
            justify-content: center;
            gap: var(--space-sm);
            margin-top: var(--space-md);
        }
        
        .password-actions button {
            padding: var(--space-sm) var(--space-md);
            font-size: 0.875rem;
        }
        
        .strength-meter {
            margin-top: var(--space-md);
        }
        
        .strength-bar {
            height: 6px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 3px;
            overflow: hidden;
        }
        
        .strength-fill {
            height: 100%;
            transition: all var(--transition-normal);
            border-radius: 3px;
        }
        
        .strength-fill.weak { width: 25%; background: #f87171; }
        .strength-fill.fair { width: 50%; background: #fbbf24; }
        .strength-fill.good { width: 75%; background: #60a5fa; }
        .strength-fill.strong { width: 100%; background: #4ade80; }
        
        .strength-label {
            text-align: center;
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: var(--space-xs);
        }
        
        .options-section {
            margin-bottom: var(--space-xl);
        }
        
        .option-group {
            margin-bottom: var(--space-lg);
        }
        
        .option-label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--space-sm);
            font-size: 0.9rem;
            color: var(--text-secondary);
        }
        
        .length-slider {
            width: 100%;
            height: 8px;
            -webkit-appearance: none;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 4px;
            outline: none;
        }
        
        .length-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            background: var(--accent-gradient);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px var(--accent-glow);
        }
        
        .checkbox-group {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: var(--space-md);
        }
        
        .checkbox-item {
            display: flex;
            align-items: center;
            gap: var(--space-sm);
            cursor: pointer;
            font-size: 0.875rem;
            color: var(--text-secondary);
        }
        
        .checkbox-item input {
            width: 18px;
            height: 18px;
            accent-color: var(--accent-primary);
            cursor: pointer;
        }
        
        .generate-btn {
            width: 100%;
            padding: var(--space-lg);
            font-size: 1.125rem;
        }
        
        .history-section {
            margin-top: var(--space-2xl);
            padding: var(--space-lg);
            background: rgba(0, 0, 0, 0.2);
            border-radius: var(--radius-md);
        }
        
        .history-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.875rem;
            color: var(--text-secondary);
            margin-bottom: var(--space-md);
        }
        
        .history-list {
            display: flex;
            flex-direction: column;
            gap: var(--space-sm);
            max-height: 150px;
            overflow-y: auto;
        }
        
        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: var(--space-sm);
            background: rgba(0, 0, 0, 0.2);
            border-radius: var(--radius-sm);
            font-family: 'Space Mono', monospace;
            font-size: 0.75rem;
            color: var(--text-muted);
        }
        
        .history-item button {
            padding: 2px 8px;
            font-size: 0.625rem;
        }
    </style>
</head>
<body>
    <div class="page-wrapper">
        <div class="container">
            <div class="card-glass">
                <header class="page-header animate-fade-in-up">
                    <h1 class="page-title">
                        oleksyuk Password Generator
                    </h1>
                    <p class="page-subtitle">Create strong, secure passwords</p>
                </header>
                
                <div class="generator-container">
                    <div class="password-display animate-fade-in-up stagger-1">
                        <div class="password-text" id="passwordDisplay">Click Generate</div>
                        <div class="password-actions">
                            <button class="btn btn-sm" onclick="copyPassword()">📋 Copy</button>
                            <button class="btn btn-sm btn-ghost" onclick="generatePassword()">🔄 Regenerate</button>
                        </div>
                        <div class="strength-meter">
                            <div class="strength-bar">
                                <div class="strength-fill" id="strengthFill"></div>
                            </div>
                            <div class="strength-label" id="strengthLabel">Generate a password to check strength</div>
                        </div>
                    </div>
                    
                    <div class="options-section animate-fade-in-up stagger-2">
                        <div class="option-group">
                            <div class="option-label">
                                <span>Password Length</span>
                                <span id="lengthValue">16</span>
                            </div>
                            <input type="range" class="length-slider" id="lengthSlider" min="8" max="64" value="16" oninput="updateLength()">
                        </div>
                        
                        <div class="option-group">
                            <div class="option-label">
                                <span>Include Characters</span>
                            </div>
                            <div class="checkbox-group">
                                <label class="checkbox-item">
                                    <input type="checkbox" id="uppercase" checked>
                                    Uppercase (A-Z)
                                </label>
                                <label class="checkbox-item">
                                    <input type="checkbox" id="lowercase" checked>
                                    Lowercase (a-z)
                                </label>
                                <label class="checkbox-item">
                                    <input type="checkbox" id="numbers" checked>
                                    Numbers (0-9)
                                </label>
                                <label class="checkbox-item">
                                    <input type="checkbox" id="symbols" checked>
                                    Symbols (!@#$%...)
                                </label>
                            </div>
                        </div>
                    </div>
                    
                    <button class="btn btn-primary generate-btn animate-fade-in-up stagger-3" onclick="generatePassword()">
                        🔑 Generate Password
                    </button>
                    
                    <div class="history-section animate-fade-in-up stagger-4">
                        <div class="history-title">📜 Recent Passwords</div>
                        <div class="history-list" id="historyList">
                            <div class="history-item" style="color: var(--text-muted); justify-content: center;">No passwords generated yet</div>
                        </div>
                    </div>
                </div>
                
                <div class="menu-list" style="max-width: 300px;">
                    <a href="./index.html" class="menu-link back-link animate-fade-in-up stagger-5">
                        ← Back to Tools
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const charSets = {
            uppercase: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
            lowercase: 'abcdefghijklmnopqrstuvwxyz',
            numbers: '0123456789',
            symbols: '!@#$%^&*()_+-=[]{}|;:,.<>?'
        };
        
        let passwordHistory = [];
        
        function updateLength() {
            document.getElementById('lengthValue').textContent = document.getElementById('lengthSlider').value;
        }
        
        function generatePassword() {
            const length = parseInt(document.getElementById('lengthSlider').value);
            const useUppercase = document.getElementById('uppercase').checked;
            const useLowercase = document.getElementById('lowercase').checked;
            const useNumbers = document.getElementById('numbers').checked;
            const useSymbols = document.getElementById('symbols').checked;
            
            let chars = '';
            if (useUppercase) chars += charSets.uppercase;
            if (useLowercase) chars += charSets.lowercase;
            if (useNumbers) chars += charSets.numbers;
            if (useSymbols) chars += charSets.symbols;
            
            if (!chars) {
                alert('Please select at least one character type');
                return;
            }
            
            let password = '';
            const array = new Uint32Array(length);
            crypto.getRandomValues(array);
            
            for (let i = 0; i < length; i++) {
                password += chars[array[i] % chars.length];
            }
            
            document.getElementById('passwordDisplay').textContent = password;
            updateStrength(password);
            addToHistory(password);
        }
        
        function updateStrength(password) {
            let score = 0;
            if (password.length >= 12) score++;
            if (password.length >= 16) score++;
            if (/[A-Z]/.test(password)) score++;
            if (/[a-z]/.test(password)) score++;
            if (/[0-9]/.test(password)) score++;
            if (/[^A-Za-z0-9]/.test(password)) score++;
            
            const strengthFill = document.getElementById('strengthFill');
            const strengthLabel = document.getElementById('strengthLabel');
            
            if (score <= 2) {
                strengthFill.className = 'strength-fill weak';
                strengthLabel.textContent = 'Weak - Add more variety';
            } else if (score <= 3) {
                strengthFill.className = 'strength-fill fair';
                strengthLabel.textContent = 'Fair - Could be stronger';
            } else if (score <= 5) {
                strengthFill.className = 'strength-fill good';
                strengthLabel.textContent = 'Good - Reasonably secure';
            } else {
                strengthFill.className = 'strength-fill strong';
                strengthLabel.textContent = 'Strong - Excellent security!';
            }
        }
        
        function copyPassword() {
            const password = document.getElementById('passwordDisplay').textContent;
            if (password && password !== 'Click Generate') {
                navigator.clipboard.writeText(password).then(() => {
                    const btn = event.target;
                    btn.textContent = '✓ Copied!';
                    setTimeout(() => btn.textContent = '📋 Copy', 2000);
                });
            }
        }
        
        function addToHistory(password) {
            passwordHistory.unshift(password);
            if (passwordHistory.length > 5) passwordHistory.pop();
            
            const historyList = document.getElementById('historyList');
            historyList.innerHTML = passwordHistory.map((pw, i) => `
                <div class="history-item">
                    <span>${pw.substring(0, 20)}${pw.length > 20 ? '...' : ''}</span>
                    <button class="btn btn-sm btn-ghost" onclick="copyHistoryItem(${i})">Copy</button>
                </div>
            `).join('');
        }
        
        function copyHistoryItem(index) {
            navigator.clipboard.writeText(passwordHistory[index]);
        }
        
        // Generate initial password
        generatePassword();
    </script>
</body>
</html>
