<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Entities | oleksyuk</title>
    <link rel="icon" type="image/png" href="https://0bsidian.s3.us-east-2.amazonaws.com/Images/Geometric_Gray_Gemstone-removebg-preview.png">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles.css">
    <style>
        .tool-shell { max-width: 1120px; margin: 0 auto; }
        .split-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: var(--space-lg); }
        .panel { background: var(--oleksyuk-card); border: 1px solid var(--oleksyuk-border); border-radius: var(--radius-lg); padding: var(--space-lg); }
        .editor { min-height: 320px; font-family: 'Space Mono', monospace; }
        @media (max-width: 900px) { .split-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="page-wrapper">
        <div class="container">
            <div class="card-glass">
                <header class="page-header animate-fade-in-up">
                    <h1 class="page-title">HTML Entities</h1>
                    <p class="page-subtitle">Escape raw HTML or decode entities back into readable markup.</p>
                </header>
                <div class="tool-shell">
                    <div class="action-row animate-fade-in-up stagger-1" style="justify-content: flex-start; margin-bottom: var(--space-lg);">
                        <button class="btn btn-primary" onclick="escapeMarkup()">Escape</button>
                        <button class="btn btn-ghost" onclick="unescapeMarkup()">Unescape</button>
                    </div>
                    <div class="split-grid">
                        <section class="panel animate-fade-in-up stagger-2">
                            <label for="htmlInput">Input</label>
                            <textarea id="htmlInput" class="editor">&lt;div class="card"&gt;oleksyuk&lt;/div&gt;</textarea>
                        </section>
                        <section class="panel animate-fade-in-up stagger-3">
                            <label for="htmlOutput">Output</label>
                            <textarea id="htmlOutput" class="editor" readonly></textarea>
                        </section>
                    </div>
                </div>
                <div class="menu-list" style="max-width: 320px;">
                    <a href="./index.html" class="menu-link back-link animate-fade-in-up stagger-4">← Back to Tools</a>
                </div>
            </div>
        </div>
    </div>
    <script>
        function escapeMarkup() {
            const value = document.getElementById('htmlInput').value;
            const escaped = value.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
            document.getElementById('htmlOutput').value = escaped;
        }

        function unescapeMarkup() {
            const textarea = document.createElement('textarea');
            textarea.innerHTML = document.getElementById('htmlInput').value;
            document.getElementById('htmlOutput').value = textarea.value;
        }

        escapeMarkup();
    </script>
</body>
</html>
