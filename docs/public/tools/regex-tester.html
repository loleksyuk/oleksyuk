<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regex Tester | oleksyuk</title>
    <link rel="icon" type="image/png" href="https://0bsidian.s3.us-east-2.amazonaws.com/Images/Geometric_Gray_Gemstone-removebg-preview.png">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles.css">
    <style>
        .tool-shell { max-width: 1100px; margin: 0 auto; }
        .split-grid { display: grid; grid-template-columns: 1fr 0.9fr; gap: var(--space-lg); }
        .panel { background: var(--oleksyuk-card); border: 1px solid var(--oleksyuk-border); border-radius: var(--radius-lg); padding: var(--space-lg); }
        .match-list { display: grid; gap: var(--space-sm); }
        .match-item { padding: var(--space-md); border-radius: var(--radius-md); background: rgba(0, 0, 0, 0.22); border: 1px solid var(--oleksyuk-border); }
        .match-label { font-family: 'Orbitron', sans-serif; font-size: 0.76rem; margin-bottom: var(--space-xs); }
        .match-value { font-family: 'Space Mono', monospace; color: var(--accent-secondary); white-space: pre-wrap; word-break: break-word; }
        @media (max-width: 900px) { .split-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="page-wrapper">
        <div class="container">
            <div class="card-glass">
                <header class="page-header animate-fade-in-up">
                    <h1 class="page-title">Regex Tester</h1>
                    <p class="page-subtitle">Try patterns, flags, and inspect what the expression is matching.</p>
                </header>

                <div class="tool-shell">
                    <div class="split-grid">
                        <section class="panel animate-fade-in-up stagger-1">
                            <div class="input-row">
                                <div class="input-group">
                                    <label for="patternInput">Pattern</label>
                                    <input id="patternInput" type="text" value="\\b\\w{4,}\\b" oninput="runRegex()">
                                </div>
                                <div class="input-group" style="max-width: 160px;">
                                    <label for="flagsInput">Flags</label>
                                    <input id="flagsInput" type="text" value="g" oninput="runRegex()">
                                </div>
                            </div>
                            <div class="input-group" style="margin-top: var(--space-md);">
                                <label for="regexText">Test Text</label>
                                <textarea id="regexText" class="main-textarea" oninput="runRegex()">oleksyuk tools are built for direct browser use.</textarea>
                            </div>
                        </section>
                        <section class="panel animate-fade-in-up stagger-2">
                            <div class="panel-title">Matches</div>
                            <div id="regexMatches" class="match-list"></div>
                        </section>
                    </div>
                </div>

                <div class="menu-list" style="max-width: 320px;">
                    <a href="./index.html" class="menu-link back-link animate-fade-in-up stagger-3">← Back to Tools</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        function runRegex() {
            const pattern = document.getElementById('patternInput').value;
            const flags = document.getElementById('flagsInput').value;
            const text = document.getElementById('regexText').value;
            const matchesEl = document.getElementById('regexMatches');

            try {
                const safeFlags = flags.includes('g') ? flags : flags + 'g';
                const regex = new RegExp(pattern, safeFlags);
                const matches = Array.from(text.matchAll(regex));

                if (!matches.length) {
                    matchesEl.innerHTML = '<div class="match-item"><div class="match-label">Result</div><div class="match-value">No matches.</div></div>';
                    return;
                }

                matchesEl.innerHTML = matches.map((match, index) => {
                    return '<div class="match-item"><div class="match-label">Match ' + (index + 1) + ' at index ' + match.index + '</div><div class="match-value">' + escapeHtml(match[0]) + '</div></div>';
                }).join('');
            } catch (error) {
                matchesEl.innerHTML = '<div class="match-item"><div class="match-label">Error</div><div class="match-value">' + escapeHtml(error.message) + '</div></div>';
            }
        }

        function escapeHtml(value) {
            return value.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        runRegex();
    </script>
</body>
</html>
