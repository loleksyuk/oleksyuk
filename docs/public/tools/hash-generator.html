<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hash Generator | oleksyuk</title>
    <link rel="icon" type="image/png" href="https://0bsidian.s3.us-east-2.amazonaws.com/Images/Geometric_Gray_Gemstone-removebg-preview.png">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles.css">
    <style>
        .tool-shell { max-width: 980px; margin: 0 auto; }
        .panel { background: var(--oleksyuk-card); border: 1px solid var(--oleksyuk-border); border-radius: var(--radius-lg); padding: var(--space-lg); }
        .hash-grid { display: grid; gap: var(--space-md); margin-top: var(--space-lg); }
        .hash-row { padding: var(--space-md); border-radius: var(--radius-md); background: rgba(0, 0, 0, 0.24); border: 1px solid var(--oleksyuk-border); }
        .hash-label { font-family: 'Orbitron', sans-serif; font-size: 0.85rem; margin-bottom: var(--space-xs); }
        .hash-value { font-family: 'Space Mono', monospace; font-size: 0.82rem; color: var(--accent-secondary); word-break: break-all; }
    </style>
</head>
<body>
    <div class="page-wrapper">
        <div class="container">
            <div class="card-glass">
                <header class="page-header animate-fade-in-up">
                    <h1 class="page-title">Hash Generator</h1>
                    <p class="page-subtitle">Generate browser-side SHA hashes for text input.</p>
                </header>

                <div class="tool-shell">
                    <section class="panel animate-fade-in-up stagger-1">
                        <label for="hashInput">Text</label>
                        <textarea id="hashInput" class="main-textarea" placeholder="Enter text to hash" oninput="generateHashes()"></textarea>
                    </section>

                    <div class="hash-grid">
                        <div class="hash-row animate-fade-in-up stagger-2">
                            <div class="hash-label">SHA-256</div>
                            <div class="hash-value" id="sha256Value">-</div>
                        </div>
                        <div class="hash-row animate-fade-in-up stagger-3">
                            <div class="hash-label">SHA-384</div>
                            <div class="hash-value" id="sha384Value">-</div>
                        </div>
                        <div class="hash-row animate-fade-in-up stagger-4">
                            <div class="hash-label">SHA-512</div>
                            <div class="hash-value" id="sha512Value">-</div>
                        </div>
                    </div>

                    <div class="action-row animate-fade-in-up stagger-5" style="justify-content: flex-start; margin-top: var(--space-lg);">
                        <button class="btn btn-primary" onclick="generateHashes()">Refresh</button>
                        <button class="btn btn-ghost" onclick="copyHash('sha256Value')">Copy SHA-256</button>
                    </div>
                </div>

                <div class="menu-list" style="max-width: 320px;">
                    <a href="./index.html" class="menu-link back-link animate-fade-in-up stagger-6">← Back to Tools</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function digest(algorithm, value) {
            const data = new TextEncoder().encode(value);
            const hash = await crypto.subtle.digest(algorithm, data);
            return Array.from(new Uint8Array(hash)).map((byte) => byte.toString(16).padStart(2, '0')).join('');
        }

        async function generateHashes() {
            const value = document.getElementById('hashInput').value;
            if (!value) {
                document.getElementById('sha256Value').textContent = '-';
                document.getElementById('sha384Value').textContent = '-';
                document.getElementById('sha512Value').textContent = '-';
                return;
            }

            document.getElementById('sha256Value').textContent = await digest('SHA-256', value);
            document.getElementById('sha384Value').textContent = await digest('SHA-384', value);
            document.getElementById('sha512Value').textContent = await digest('SHA-512', value);
        }

        async function copyHash(id) {
            const value = document.getElementById(id).textContent;
            if (!value || value === '-') return;
            try {
                await navigator.clipboard.writeText(value);
            } catch (error) {
                window.prompt('Copy hash:', value);
            }
        }
    </script>
</body>
</html>
