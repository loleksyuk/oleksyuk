<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timestamp Converter | oleksyuk</title>
    <link rel="icon" type="image/png" href="https://0bsidian.s3.us-east-2.amazonaws.com/Images/Geometric_Gray_Gemstone-removebg-preview.png">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles.css">
    <style>
        .tool-shell { max-width: 980px; margin: 0 auto; }
        .split-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: var(--space-lg); }
        .panel { background: var(--oleksyuk-card); border: 1px solid var(--oleksyuk-border); border-radius: var(--radius-lg); padding: var(--space-lg); }
        .time-card { padding: var(--space-md); border-radius: var(--radius-md); background: rgba(0, 0, 0, 0.22); border: 1px solid var(--oleksyuk-border); margin-top: var(--space-md); }
        .time-label { font-family: 'Orbitron', sans-serif; font-size: 0.8rem; margin-bottom: var(--space-xs); }
        .time-value { font-family: 'Space Mono', monospace; color: var(--accent-secondary); word-break: break-word; }
        @media (max-width: 900px) { .split-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="page-wrapper">
        <div class="container">
            <div class="card-glass">
                <header class="page-header animate-fade-in-up">
                    <h1 class="page-title">Timestamp Converter</h1>
                    <p class="page-subtitle">Move between Unix timestamps, local time, and UTC.</p>
                </header>

                <div class="tool-shell">
                    <div class="split-grid">
                        <section class="panel animate-fade-in-up stagger-1">
                            <label for="timestampInput">Unix timestamp</label>
                            <input id="timestampInput" type="text" placeholder="1710000000 or 1710000000000" oninput="fromTimestamp()">
                            <div class="time-card">
                                <div class="time-label">Local</div>
                                <div class="time-value" id="localValue">-</div>
                            </div>
                            <div class="time-card">
                                <div class="time-label">UTC</div>
                                <div class="time-value" id="utcValue">-</div>
                            </div>
                        </section>
                        <section class="panel animate-fade-in-up stagger-2">
                            <label for="dateInput">Date and time</label>
                            <input id="dateInput" type="datetime-local" oninput="toTimestamp()">
                            <div class="time-card">
                                <div class="time-label">Seconds</div>
                                <div class="time-value" id="secondsValue">-</div>
                            </div>
                            <div class="time-card">
                                <div class="time-label">Milliseconds</div>
                                <div class="time-value" id="millisecondsValue">-</div>
                            </div>
                        </section>
                    </div>
                </div>

                <div class="menu-list" style="max-width: 320px;">
                    <a href="./index.html" class="menu-link back-link animate-fade-in-up stagger-3">← Back to Tools</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        function fromTimestamp() {
            const raw = document.getElementById('timestampInput').value.trim();
            if (!raw) {
                document.getElementById('localValue').textContent = '-';
                document.getElementById('utcValue').textContent = '-';
                return;
            }
            const numeric = Number(raw);
            const millis = raw.length <= 10 ? numeric * 1000 : numeric;
            const date = new Date(millis);
            const invalid = Number.isNaN(date.getTime());
            document.getElementById('localValue').textContent = invalid ? 'Invalid timestamp' : date.toLocaleString();
            document.getElementById('utcValue').textContent = invalid ? 'Invalid timestamp' : date.toUTCString();
        }

        function toTimestamp() {
            const value = document.getElementById('dateInput').value;
            if (!value) {
                document.getElementById('secondsValue').textContent = '-';
                document.getElementById('millisecondsValue').textContent = '-';
                return;
            }
            const millis = new Date(value).getTime();
            document.getElementById('secondsValue').textContent = String(Math.floor(millis / 1000));
            document.getElementById('millisecondsValue').textContent = String(millis);
        }
    </script>
</body>
</html>
