<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>‎</title>
    <link rel="icon" type="image/png" href="https://0bsidian.s3.us-east-2.amazonaws.com/Images/Geometric_Gray_Gemstone-removebg-preview.png">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Orbitron', sans-serif;
            /* Note: Use this background for consistency across all pages */
            background-image: url('https://0bsidian.s3.us-east-2.amazonaws.com/Images/obsidian-backround.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #d3d3d3; /* Light grey tint */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            position: relative;
        }
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(128, 128, 128, 0.5); /* Faint grey overlay */
            z-index: 1;
        }
        .container {
            display: none; /* Hidden until password is correct */
            background-color: rgba(0, 0, 0, 0.7); /* 70% opacity black */
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            width: 90%; /* Box fills 90% of screen width */
            box-sizing: border-box;
            flex-direction: column;
            align-items: center; /* Align content to the center */
        }
        .password-prompt {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(0, 0, 0, 0.7); /* 70% opacity black */
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            width: 90%;
            max-width: 400px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 2;
        }
        h1 {
            font-size: 2.5em; /* Base size, approx 40px assuming 1em = 16px */
            margin-bottom: 10px;
            align-self: center; /* Keep title centered */
        }
        h1 .large-zero {
            font-size: 45px; /* 5px larger than base 40px */
        }
        .subtitle {
            font-size: 1.2em;
            margin-bottom: 20px;
            color: #d3d3d3;
        }
        .menu-button {
            display: block;
            width: 200px;
            padding: 15px;
            margin: 10px 0;
            background-color: #333;
            color: #d3d3d3;
            text-decoration: none;
            border-radius: 5px;
            font-size: 1.2em;
            transition: background-color 0.3s;
            text-align: center;
        }
        .menu-button:hover {
            background-color: #555;
        }
        .password-input {
            padding: 10px;
            font-size: 1em;
            width: 200px;
            border: 1px solid #555;
            border-radius: 5px;
            background: #333;
            color: #d3d3d3;
            outline: none;
            transition: border-color 0.3s;
            font-family: 'Orbitron', sans-serif;
            margin-bottom: 10px;
        }
        .password-input:focus {
            border-color: #00aaff;
        }
        .submit-button {
            padding: 10px 20px;
            background-color: #333;
            color: #d3d3d3;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1.2em;
            transition: background-color 0.3s;
            font-family: 'Orbitron', sans-serif;
        }
        .submit-button:hover {
            background-color: #555;
        }
        .error-message {
            color: #ff5555;
            font-size: 1em;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
<body>
    <div id="overlay" class="overlay"></div>
    <div id="passwordPrompt" class="password-prompt">
        <h1>oleksyuk DDX</h1>
        <div class="subtitle">Enter Password to Access</div>
        <input type="password" id="passwordInput" class="password-input" placeholder="Password">
        <button class="submit-button" onclick="checkPassword()">Submit</button>
        <div id="errorMessage" class="error-message">Incorrect password. Please try again.</div>
    </div>
    <div id="mainContent" class="container">
        <h1>oleksyuk DDX</h1>
        <div class="subtitle">Coming Soon</div>
        <a href="./dailydox/ethan-zang.html" class="menu-button">Ethan Zang</a>
        <a href="./home" class="menu-button">Back to Menu</a>
    </div>

    <script>
        const correctPassword = "eddie"; // never changes

        function checkPassword() {
            const passwordInput = document.getElementById('passwordInput').value;
            const errorMessage = document.getElementById('errorMessage');
            const passwordPrompt = document.getElementById('passwordPrompt');
            const overlay = document.getElementById('overlay');
            const mainContent = document.getElementById('mainContent');

            if (passwordInput === correctPassword) {
                passwordPrompt.style.display = 'none';
                overlay.style.display = 'none';
                mainContent.style.display = 'flex';
            } else {
                errorMessage.style.display = 'block';
                document.getElementById('passwordInput').value = ''; // Clear the input
            }
        }

        // Allow Enter key to submit password
        document.getElementById('passwordInput').addEventListener('keypress', function(event) {
            if (event.key === 'Enter') {
                checkPassword();
            }
        });
    </script>
</body>
</html>
